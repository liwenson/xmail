# 工作流的名称，会显示在 GitHub Actions 页面
name: Deploy to Cloudflare

# 'on' 关键字定义了触发此工作流的事件
on:
  # 当有代码推送到 'main' 分支时，自动触发此工作流
  push:
    branches:
      - main
  # 允许你在 GitHub Actions 页面手动点击按钮来触发此工作流
  workflow_dispatch:

# 'jobs' 关键字定义了工作流中要执行的一系列任务
jobs:
  # 定义一个名为 'deploy' 的任务
  deploy:
    # 指定此任务运行在最新版的 Ubuntu 虚拟环境中
    runs-on: ubuntu-latest
    # 此任务在 GitHub UI 中显示的名称
    name: Deploy
    # 'steps' 关键字定义了任务中要按顺序执行的一系列步骤
    steps:
      # 第一步：检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 第二步：设置 pnpm 包管理器
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # 第三步：设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # 第四步：安装项目依赖
      - name: Install dependencies
        run: pnpm install

      # 第五步：手动安装 Wrangler
      - name: Install Wrangler
        run: pnpm add wrangler@4 -w

      # 第六步：构建项目
      - name: Build
        run: pnpm run build

      # 第七步：配置 Wrangler 的 toml 文件
      - name: Configure Wrangler
        run: |
          # 替换 D1 数据库 ID 的占位符
          sed -i "s/your-database-id/${D1_DATABASE_ID}/g" wrangler.toml
          # 替换 D1 数据库名称
          sed -i "s/database_name = \"xmail\"/database_name = \"${D1_DATABASE_NAME}\"/g" wrangler.toml
          # 替换邮箱域名
          sed -i "s/VITE_EMAIL_DOMAIN = \"localhost\"/VITE_EMAIL_DOMAIN = \"${VITE_EMAIL_DOMAIN}\"/g" wrangler.toml
          # 显示修改后的内容
          cat wrangler.toml
        env:
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          D1_DATABASE_NAME: ${{ secrets.D1_DATABASE_NAME }}
          VITE_EMAIL_DOMAIN: ${{ secrets.VITE_EMAIL_DOMAIN }}

      # 第八步：检查 Cloudflare 密钥是否存在
      - name: Check for Cloudflare credentials
        id: cf_creds
        run: |
          if [ -z "${{ secrets.CF_API_TOKEN }}" ] || [ -z "${{ secrets.CF_ACCOUNT_ID }}" ]; then
            echo "Cloudflare credentials not found, skipping deployment."
            echo "has_creds=false" >> $GITHUB_ENV
          else
            echo "has_creds=true" >> $GITHUB_ENV
          fi

      # 第九步：部署到 Cloudflare
      - name: Deploy to Cloudflare
        if: env.has_creds == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy